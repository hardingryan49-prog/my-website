<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYSTEM_INTEGRITY_CHECK // TERMINAL_ACCESS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'JetBrains Mono', monospace;
        }
        
        body {
            background-color: #000;
            cursor: none;
        }
        
        /* Flashlight effect */
        .flashlight {
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.15) 0%, rgba(6, 182, 212, 0.05) 40%, transparent 70%);
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 0;
            transition: opacity 0.1s ease;
        }
        
        .glass-card {
            background: rgba(10, 10, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 92, 246, 0.3);
            box-shadow: 
                0 0 30px rgba(139, 92, 246, 0.2),
                inset 0 0 30px rgba(6, 182, 212, 0.05);
        }
        
        .glass-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, #8b5cf6, #06b6d4, #8b5cf6, #06b6d4);
            z-index: -1;
            border-radius: inherit;
            opacity: 0.5;
            filter: blur(8px);
            animation: glowPulse 3s ease-in-out infinite;
        }
        
        @keyframes glowPulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.7; }
        }
        
        .neon-text-purple {
            text-shadow: 0 0 10px rgba(139, 92, 246, 0.8), 0 0 20px rgba(139, 92, 246, 0.5);
        }
        
        .neon-text-cyan {
            text-shadow: 0 0 10px rgba(6, 182, 212, 0.8), 0 0 20px rgba(6, 182, 212, 0.5);
        }
        
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #06b6d4, transparent);
            animation: scan 4s linear infinite;
            opacity: 0.6;
        }
        
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
        
        .blink {
            animation: blink 1s step-end infinite;
        }
        
        @keyframes blink {
            50% { opacity: 0; }
        }
        
        .data-row {
            border-bottom: 1px solid rgba(139, 92, 246, 0.2);
            transition: all 0.3s ease;
        }
        
        .data-row:hover {
            background: rgba(139, 92, 246, 0.1);
            border-bottom-color: rgba(6, 182, 212, 0.5);
        }
        
        .loading-dots::after {
            content: '';
            animation: dots 1.5s steps(4, end) infinite;
        }
        
        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
            100% { content: ''; }
        }
        
        .error-state {
            border-color: rgba(239, 68, 68, 0.5);
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.2);
        }
        
        /* Custom cursor */
        .cursor-dot {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #06b6d4;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 10px #06b6d4, 0 0 20px #06b6d4;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center overflow-hidden">
    
    <!-- Flashlight effect -->
    <div id="flashlight" class="flashlight"></div>
    
    <!-- Custom cursor -->
    <div id="cursor-dot" class="cursor-dot"></div>
    
    <!-- Main Container -->
    <div class="relative z-10 w-full max-w-2xl px-4">
        
        <!-- Data Display -->
        <div id="data-display">
            
            <div class="glass-card rounded-lg p-8 relative overflow-hidden">
                
                <div class="scan-line"></div>
                
                <!-- Header -->
                <div class="border-b border-purple-500/30 pb-4 mb-6">
                    <div class="flex items-center justify-between">
                        <h2 class="text-2xl font-bold text-white neon-text-purple">
                            <span class="text-cyan-400">root@visitor</span>:<span class="text-purple-400">~</span>$ identity<span class="blink">_</span>
                        </h2>
                        <div class="flex items-center gap-2">
                            <div id="status-indicator" class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div>
                            <span class="text-green-400 text-sm">LIVE</span>
                        </div>
                    </div>
                    <p class="text-gray-400 text-sm mt-2">Public network intelligence gathered in real-time</p>
                </div>
                
                <!-- Data Grid -->
                <div class="space-y-1">
                    <div class="data-row flex justify-between items-center py-4 px-4">
                        <span class="text-purple-400 font-bold">PUBLIC_IP</span>
                        <span id="ip-address" class="text-cyan-400 text-lg loading-dots">fetching</span>
                    </div>
                    <div class="data-row flex justify-between items-center py-4 px-4">
                        <span class="text-purple-400 font-bold">CITY</span>
                        <span id="city" class="text-cyan-400 text-lg loading-dots">fetching</span>
                    </div>
                    <div class="data-row flex justify-between items-center py-4 px-4">
                        <span class="text-purple-400 font-bold">REGION</span>
                        <span id="region" class="text-cyan-400 text-lg loading-dots">fetching</span>
                    </div>
                    <div class="data-row flex justify-between items-center py-4 px-4">
                        <span class="text-purple-400 font-bold">COUNTRY</span>
                        <span id="country" class="text-cyan-400 text-lg loading-dots">fetching</span>
                    </div>
                    <div class="data-row flex justify-between items-center py-4 px-4 border-b-0">
                        <span class="text-purple-400 font-bold">ISP/ORG</span>
                        <span id="isp" class="text-cyan-400 text-lg loading-dots">fetching</span>
                    </div>
                </div>
                
                <!-- Footer -->
                <div class="mt-6 pt-4 border-t border-purple-500/30 flex justify-between items-center">
                    <span class="text-gray-500 text-xs">SESSION_ID: <span id="session-id"></span></span>
                    <button id="refresh-btn" class="text-cyan-400 hover:text-white transition-colors text-sm border border-cyan-400/50 px-4 py-2 rounded hover:bg-cyan-400/20">
                        [ REFRESH_DATA ]
                    </button>
                </div>
                
                <!-- Error Message Container -->
                <div id="error-container" class="hidden mt-4 p-4 bg-red-900/30 border border-red-500/50 rounded">
                    <p class="text-red-400 text-sm font-bold">⚠ CONNECTION_BLOCKED</p>
                    <p id="error-message" class="text-red-300 text-xs mt-1"></p>
                    <p class="text-gray-400 text-xs mt-2">Ad-blocker or VPN may be interfering with API requests.</p>
                </div>
            </div>
            
            <!-- B80L Bar -->
            <div class="glass-card rounded-lg mt-4 p-4 flex items-center justify-center">
                <span class="text-4xl font-bold neon-text-purple tracking-widest">B80L</span>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // FLASHLIGHT SPOTLIGHT EFFECT
        // ============================================
        const flashlight = document.getElementById('flashlight');
        const cursorDot = document.getElementById('cursor-dot');
        
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            // Move flashlight
            flashlight.style.left = x + 'px';
            flashlight.style.top = y + 'px';
            
            // Move custom cursor
            cursorDot.style.left = x + 'px';
            cursorDot.style.top = y + 'px';
        });
        
        // ============================================
        // IP & LOCATION FETCH
        // ============================================
        const API_TIMEOUT = 10000; // 10 second timeout
        
        async function fetchWithTimeout(url, options = {}) {
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), API_TIMEOUT);
            
            try {
                const response = await fetch(url, {
                    ...options,
                    signal: controller.signal
                });
                clearTimeout(timeoutId);
                return response;
            } catch (error) {
                clearTimeout(timeoutId);
                throw error;
            }
        }
        
        async function fetchIPAndLocation() {
            const elements = {
                ip: document.getElementById('ip-address'),
                city: document.getElementById('city'),
                region: document.getElementById('region'),
                country: document.getElementById('country'),
                isp: document.getElementById('isp'),
                errorContainer: document.getElementById('error-container'),
                errorMessage: document.getElementById('error-message'),
                dataDisplay: document.querySelector('.glass-card')
            };
            
            // Reset states
            elements.errorContainer.classList.add('hidden');
            elements.dataDisplay.classList.remove('error-state');
            
            const showError = (message) => {
                elements.errorContainer.classList.remove('hidden');
                elements.errorMessage.textContent = message;
                elements.dataDisplay.classList.add('error-state');
                
                ['ip', 'city', 'region', 'country', 'isp'].forEach(field => {
                    elements[field].textContent = 'UNAVAILABLE';
                    elements[field].classList.remove('loading-dots');
                    elements[field].classList.add('text-red-400');
                });
            };
            
            try {
                // Fetch IP address
                const ipResponse = await fetchWithTimeout('https://api.ipify.org?format=json');
                if (!ipResponse.ok) throw new Error('IP service unavailable');
                const ipData = await ipResponse.json();
                const ip = ipData.ip;
                
                elements.ip.textContent = ip;
                elements.ip.classList.remove('loading-dots');
                
                // Fetch location data based on IP
                const locationResponse = await fetchWithTimeout(`http://ip-api.com/json/${ip}?fields=status,message,country,regionName,city,isp,org`);
                if (!locationResponse.ok) throw new Error('Location service unavailable');
                const locationData = await locationResponse.json();
                
                if (locationData.status === 'fail') {
                    throw new Error(locationData.message || 'Location lookup failed');
                }
                
                // Update fields with location data
                elements.city.textContent = locationData.city || 'Unknown';
                elements.city.classList.remove('loading-dots');
                
                elements.region.textContent = locationData.regionName || 'Unknown';
                elements.region.classList.remove('loading-dots');
                
                elements.country.textContent = locationData.country || 'Unknown';
                elements.country.classList.remove('loading-dots');
                
                elements.isp.textContent = locationData.isp || locationData.org || 'Unknown';
                elements.isp.classList.remove('loading-dots');
                
            } catch (error) {
                console.error('Fetch error:', error);
                
                if (error.name === 'AbortError') {
                    showError('Request timed out. Check network connection.');
                } else if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    showError('Network request blocked. Ad-blocker or CORS policy may be active.');
                } else {
                    showError(error.message || 'Unknown error occurred during data fetch.');
                }
            }
        }
        
        // ============================================
        // INITIALIZATION
        // ============================================
        const refreshBtn = document.getElementById('refresh-btn');
        
        // Generate random session ID
        document.getElementById('session-id').textContent = Math.random().toString(36).substring(2, 10).toUpperCase();
        
        // Fetch IP data on load
        fetchIPAndLocation();
        
        refreshBtn.addEventListener('click', () => {
            fetchIPAndLocation();
        });
    </script>
</body>
</html>
